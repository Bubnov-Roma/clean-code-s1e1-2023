<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css?family=Lato:300,400,700"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" media="screen" charset="utf-8" />
    <title>Todo App</title>
  </head>
  <body class="body">
    <header class="header">
      <img
        class="header__image"
        src="./eisenhower-matrix.jpg"
        alt="todo header background"
      />
      <a
        class="header__link"
        href="https://goal-life.com/page/method/matrix-eisenhower"
        >Want more details?
      </a>
    </header>
    <main class="main">
      <section class="addition-container">
        <label for="new-task">Add Item</label>
        <div class="task-row-wrapper">
          <input id="new-task" class="task" type="text" />
          <button class="add-button">Add</button>
        </div>
      </section>
      <section class="todo-container">
        <h3 class="todo-container__title">Todo</h3>
        <ul class="todo-list" id="incompleteTasks">
          <li class="todo-list__item">
            <input type="checkbox" />
            <label class="task">Pay Bills</label>
            <input type="text" class="task" />
            <button class="edit-button">Edit</button>
            <button class="delete-button">
              <img
                class="delete-button__icon"
                src="./remove.svg"
                alt="remove icon"
              />
            </button>
          </li>
          <li class="todo-list__item todo-list__item_edit">
            <input type="checkbox" />
            <label class="task">Go Shopping</label>
            <input type="text" value="Go Shopping" class="task" />
            <button class="edit-button">Save</button>
            <button class="delete-button">
              <img
                class="delete-button__icon"
                src="./remove.svg"
                alt="remove icon"
              />
            </button>
          </li>
        </ul>
      </section>
      <section class="completed-container">
        <h3 class="completed-container__title">Completed</h3>
        <ul class="todo-list" id="completed-tasks">
          <li class="todo-list__item completed-tasks__item">
            <input type="checkbox" checked />
            <label class="task">See the Doctor</label>
            <input type="text" class="task" />
            <button class="edit-button">Edit</button>
            <button class="delete-button">
              <img
                class="delete-button__icon"
                src="./remove.svg"
                alt="remove icon"
              />
            </button>
          </li>
        </ul>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
